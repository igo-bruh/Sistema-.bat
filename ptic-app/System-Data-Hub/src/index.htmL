<!DOCTYPE html>
<html lang="pt-br">

      <div class="left-content">
        
        <button class="btn-menu" id="hamburger">
         ☰

          <h2>Sys Menu</h2>
          <button class="close-btn" id="btn-close">×</button>
        </div>
        <nav>
          <a href="#pop" >Dashboard</a>
          <a href="#tutoriais">Scripts</a>
          <a href="#sobre">configurações</a>
          <a href="#contato">Sistema</a>
          <a href="#funciona">Funcionamento</a>
        </nav>
        <div class="GIF">
          <img src="img/ahatintime-hatkid.gif" alt="">

       </aside>
        <h1>System Data Hub</h1> 
      <img src="#logo" alt="">     
      
      <a href="#documentacao">Documentação</a>
      <a href="#tutoriais">Tutoriais</a>
      <a href="#sobre">Sobre</a>
      <a href="#contato">Contato</a>

      <div class="input-container">
        <input class="inputsearch" type="text" placeholder="Pesquisar...">
        <button type="submit" class="searchdown">Pesquisar</button>
      </div>
      </div>

          <a id="terminal-btn" class="action">
            <img src="img/terminal.png" alt="">
            <p>Terminal</p>
          </a>
          <a id="scandisk-btn" class="action">
            <img src="img/disk.png" alt="">
            <p>Sandisk</p>
          </a><a id="clean"  class="action">
            <img src="img/clean.png" alt="">

          </a>

            <p>Atualizar drivers</p>
          </a><a href="" class="action">
            <img src="img/download.png" alt="">
            <p>Opções de Downloads</p>
          </a>
        </div>

      </section>
