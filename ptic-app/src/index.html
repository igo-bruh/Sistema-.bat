<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <script type="module"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ptic-app</title>
</head>
<body>
  <audio loop autoplay>
    <source src="img/doors-elevator-music.mp3" type="audio/mpeg">
  </audio>
  <header class="header">
    <article class="container-header">
      <div class="left-content">
      <h1>System Data Hub</h1> 
      <img src="#logo" alt="">     
      
      <a href="#documentacao">Documentação</a>
      <a href="#tutoriais">Tutoriais</a>
      <a href="#sobre">Sobre</a>
      <a href="#contato">Contato</a>
      </div>
      <div class="right-content">
      <a class="gitlink" target="_blank" title="repositorio" href="https://github.com/igo-bruh/Sistema-.bat"><img src="img/git.png" alt="" class="gite"></a>
      <div class="input-container">
        <input class="inputsearch" type="text" placeholder="Pesquisar...">
        <button type="submit" class="searchdown">Pesquisar</button>
      </div>
      </div>
    </article>
  </header>
  <main class="main">
      <section class="container">
        <div class="cont-main-h1">
        <h1  class="main-h1">System Data Hub.</h1>
        </div>
        <img src="#logo" alt="">
        <article class="quickaction">
        <h1 class="quickatitle">Ações Rápidas</h1>
        <div class="acoescont">
          <a id="terminal-btn" class="action">
            <img src="img/terminal.png" alt="">
            <p>Terminal</p>
          </a>
          <a id="scandisk-btn" class="action">
            <img src="img/disk.png" alt="">
            <p>Sandisk</p>
          </a><a id="clean"  class="action">
            <img src="" alt="">
            <p>Limpeza de arquivos temporários</p>
          </a>
          <a id="update" class="action">
            <img src="" alt="">
            <p>Atualizar drivers</p>
          </a><a href="" class="action"></a>
        </div>
        </article>
        
        
      </section>
  <script type="module" src="main.js"></script>
</body>
</html>
